# CHATRON X — DaedalusCore v10.0
# Docker Compose: Core + Frontend
# Or4cl3 AI Solutions

version: '3.9'

services:
  # ── DaedalusCore FastAPI Backend ──────────────────────────────────
  daedalus-core:
    build:
      context: ./daedalus-core
      dockerfile: Dockerfile
    container_name: chatron-x-core
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=false
    volumes:
      - ./daedalus-core:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - chatron-network

  # ── Next.js Frontend ───────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: chatron-x-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://daedalus-core:8000
    depends_on:
      - daedalus-core
    networks:
      - chatron-network
    restart: unless-stopped

networks:
  chatron-network:
    driver: bridge
